<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#shine)"/>

  <!-- Form document shape (subtle, behind the F) -->
  <rect x="140" y="88" width="260" height="336" rx="24" fill="white" opacity="0.12"/>
  <!-- Form lines (representing form fields) -->
  <rect x="180" y="300" width="140" height="12" rx="6" fill="white" opacity="0.18"/>
  <rect x="180" y="330" width="100" height="12" rx="6" fill="white" opacity="0.14"/>
  <rect x="180" y="360" width="120" height="12" rx="6" fill="white" opacity="0.10"/>

  <!-- Stylized F letterform -->
  <path d="
    M 180 136
    L 340 136
    Q 352 136 352 148
    L 352 168
    Q 352 180 340 180
    L 228 180
    L 228 232
    L 310 232
    Q 322 232 322 244
    L 322 264
    Q 322 276 310 276
    L 228 276
    L 228 380
    Q 228 396 212 396
    L 196 396
    Q 180 396 180 380
    Z
  " fill="white"/>

  <!-- Accent dot (the "a" in Formora, like a cursor/active state) -->
  <circle cx="360" cy="372" r="22" fill="#FBBF24"/>
</svg>
