name: Bug Report
description: Report a bug in Formora
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Create a schema with...
        2. Pass it to FormBuilder...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or screenshots if applicable.
    validations:
      required: true

  - type: textarea
    id: schema
    attributes:
      label: Schema (if applicable)
      description: The JSON schema that triggers the issue.
      render: json

  - type: input
    id: version
    attributes:
      label: Formora Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React Version
      placeholder: "18.x or 19.x"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Environment
      placeholder: "Chrome 125, Node 22, etc."

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or links to a reproduction.
