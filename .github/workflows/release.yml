name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  auto-tag:
    name: Auto Tag on Version Change
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      tagged: ${{ steps.tag.outputs.tagged }}
      version: ${{ steps.tag.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if version changed
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release."
            echo "tagged=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "tagged=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: auto-tag
    if: |
      always() && (
        startsWith(github.ref, 'refs/tags/v') ||
        (needs.auto-tag.result == 'success' && needs.auto-tag.outputs.tagged == 'true')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ needs.auto-tag.outputs.version }}" ]; then
            echo "VERSION=${{ needs.auto-tag.outputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{if(flag) exit} flag && !/^---$/{print}" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for version ${VERSION}" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
